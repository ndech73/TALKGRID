<svg width="300" height="200" viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: 'Segoe UI', sans-serif; }
  </style>

  <!-- Shadow bubble -->
  <rect x="111" y="18" width="82" height="65" rx="18" fill="#2EC4B6" opacity="0.15"/>
  <!-- Main dark bubble -->
  <rect x="103" y="14" width="82" height="65" rx="18" fill="#1A1A2E" stroke="#2EC4B6" stroke-width="2"/>
  <!-- Teal accent bubble -->
  <rect x="93" y="38" width="70" height="52" rx="14" fill="#2EC4B6"/>
  <!-- Grid on teal bubble -->
  <line x1="105" y1="50" x2="151" y2="50" stroke="#1A1A2E" stroke-width="1.5" opacity="0.4"/>
  <line x1="105" y1="62" x2="151" y2="62" stroke="#1A1A2E" stroke-width="1.5" opacity="0.4"/>
  <line x1="105" y1="74" x2="151" y2="74" stroke="#1A1A2E" stroke-width="1.5" opacity="0.4"/>
  <line x1="115" y1="40" x2="115" y2="86" stroke="#1A1A2E" stroke-width="1.5" opacity="0.4"/>
  <line x1="129" y1="40" x2="129" y2="86" stroke="#1A1A2E" stroke-width="1.5" opacity="0.4"/>
  <line x1="143" y1="40" x2="143" y2="86" stroke="#1A1A2E" stroke-width="1.5" opacity="0.4"/>
  <!-- Bubble tail -->
  <polygon points="101,86 91,104 117,86" fill="#2EC4B6"/>
  <!-- Connected dots on dark bubble -->
  <circle cx="123" cy="40" r="3.5" fill="#2EC4B6"/>
  <circle cx="144" cy="32" r="3.5" fill="#2EC4B6"/>
  <circle cx="165" cy="40" r="3.5" fill="#2EC4B6"/>
  <line x1="123" y1="40" x2="144" y2="32" stroke="#2EC4B6" stroke-width="1" opacity="0.6"/>
  <line x1="144" y1="32" x2="165" y2="40" stroke="#2EC4B6" stroke-width="1" opacity="0.6"/>
  <!-- Wordmark -->
  <text x="150" y="142" text-anchor="middle" font-size="28" font-weight="700" fill="#ffffff" letter-spacing="1">talkgrid</text>
  <!-- Tagline -->
  <text x="150" y="162" text-anchor="middle" font-size="11" fill="#2EC4B6" letter-spacing="3">connect · chat</text>
</svg>
